<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OHC BRAIN AI - Gerador de Prompts Contábeis</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
        }

        .container {
            background: #1a1a1a;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            padding: 40px;
            max-width: 780px;
            width: 100%;
            border: 1px solid #2a2a2a;
            transition: border-color 0.35s ease;
        }

        /* ===== TOPO ===== */
        .topo {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .topo span {
            color: #a0a0a0;
            font-size: 14px;
            background: #1f1f1f;
            padding: 6px 14px;
            border-radius: 20px;
            transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
        }

        /* ===== TÍTULO ===== */
        .titulo-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            margin-bottom: 10px;
        }

        .simbolo {
            font-size: 32px;
            filter: drop-shadow(0 0 12px currentColor);
            animation: pulse 2s ease-in-out infinite;
            line-height: 1;
        }

        .simbolo-cerebro { color: #8b5cf6; animation-delay: 0s; }
        .simbolo-contabil { color: #06b6d4; animation-delay: 0.5s; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.15); opacity: 0.85; }
        }

        h1 {
            font-size: 36px;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #8b5cf6 0%, #06b6d4 50%, #8b5cf6 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease infinite;
            text-align: center;
            margin: 0;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% center; }
            50% { background-position: 100% center; }
        }

        .subtitle {
            text-align: center;
            color: #a0a0a0;
            margin-bottom: 30px;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        /* ===== FORMULÁRIO ===== */
        label {
            display: block;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 8px;
            margin-top: 15px;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
        }

        select,
        textarea,
        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s;
            background: #0f0f0f;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
        }

        select:focus,
        textarea:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: #8b5cf6;
        }

        select option {
            background: #1a1a1a;
            color: #ffffff;
        }

        textarea { resize: vertical; min-height: 100px; }
        textarea::placeholder,
        input[type="text"]::placeholder { color: #6b6b6b; }

        /* ===== BOTÃO GERAR ===== */
        .btn-gerar {
            width: 100%;
            padding: 14px;
            margin-top: 25px;
            background: #4a4a4a;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: not-allowed;
            transition: all 0.3s;
            font-family: 'Outfit', sans-serif;
            letter-spacing: 0.5px;
        }

        .btn-gerar.ativo {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
            cursor: pointer;
        }

        .btn-gerar.ativo:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(139, 92, 246, 0.4);
        }

        /* ===== RESULTADO ===== */
        .resultado {
            margin-top: 25px;
            padding: 20px;
            background: #0f0f0f;
            border-left: 4px solid #8b5cf6;
            border-radius: 8px;
            display: none;
        }

        .resultado.mostrar {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .prompt-texto {
            color: #e0e0e0;
            line-height: 1.6;
            margin-bottom: 20px;
            white-space: pre-wrap;
            font-size: 14px;
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 400;
            background: #0a0a0a;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #2a2a2a;
            max-height: 300px;
            overflow-y: auto;
        }

        /* ===== LEGENDA ===== */
        .legenda {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
            font-size: 11px;
            color: #888;
            flex-wrap: wrap;
            align-items: center;
        }

        .legenda-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legenda-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .dot-direto { background: #10b981; }
        .dot-copiar { background: #f59e0b; }

        /* ===== SEÇÃO DE PLATAFORMAS ===== */
        .plataformas-label {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 14px;
            color: #a0a0a0;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .plataformas-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 18px;
        }

        @media (max-width: 600px) {
            .plataformas-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* ===== BOTÃO DE PLATAFORMA ===== */
        .btn-plataforma {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 10px;
            background: #1a1a1a;
            border: 1px solid #2e2e2e;
            border-radius: 12px;
            color: #e0e0e0;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .btn-plataforma::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 12px;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .btn-plataforma:hover {
            transform: translateY(-3px);
            background: #1f1f1f;
        }

        .btn-plataforma .logo-ia {
            width: 26px;
            height: 26px;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .btn-plataforma:hover .logo-ia {
            transform: scale(1.1);
        }

        .btn-plataforma .nome-ia {
            white-space: nowrap;
            font-size: 13px;
        }

        /* ===== CORES HOVER POR PLATAFORMA ===== */
        .btn-chatgpt:hover {
            border-color: #10a37f;
            box-shadow: 0 0 18px rgba(16, 163, 127, 0.3);
            background: #11241e;
        }

        .btn-perplexity:hover {
            border-color: #1e8c8c;
            box-shadow: 0 0 18px rgba(30, 140, 140, 0.3);
            background: #0f2022;
        }

        .btn-gemini:hover {
            border-color: #f59e0b;
            box-shadow: 0 0 18px rgba(245, 158, 11, 0.35);
            background: #1f180d;
        }

        .btn-claude:hover {
            border-color: #d97706;
            box-shadow: 0 0 18px rgba(217, 119, 6, 0.3);
            background: #1f180d;
        }

        /* ===== BOTÃO COPIAR PROMPT ===== */
        .btn-copiar-container {
            display: flex;
            justify-content: center;
            margin-top: 12px;
            margin-bottom: 4px;
        }

        .btn-copiar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 30px;
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
            border: none;
            border-radius: 10px;
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.25s ease;
            min-width: 200px;
            letter-spacing: 0.5px;
        }

        .btn-copiar:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(139, 92, 246, 0.5);
        }

        .btn-copiar:active {
            transform: scale(0.97);
        }

        .btn-copiar .icone-copiar {
            font-size: 18px;
        }

        /* ===== MENSAGEM COPIADO ===== */
        .msg-copiado {
            text-align: center;
            color: #a78bfa;
            font-weight: 600;
            margin-top: 10px;
            display: none;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
        }

        /* ===== DIVISOR ===== */
        .divisor {
            border: none;
            border-top: 1px solid #2a2a2a;
            margin: 16px 0;
        }
    </style>
</head>
<body>
    <div class="container" id="container">

        <!-- Badge Topo -->
        <div class="topo">
            <span id="badgeTopo">✨ Gerador de Prompts Contábeis</span>
        </div>

        <!-- Título -->
        <div class="titulo-wrapper">
            <span class="simbolo simbolo-cerebro">🧠</span>
            <h1>OHC BRAIN AI</h1>
            <span class="simbolo simbolo-contabil">☤</span>
        </div>

        <p class="subtitle" id="subtituloPrincipal">
            Selecione uma categoria e descreva sua necessidade contábil para gerar um prompt otimizado!
        </p>

        <!-- Formulário -->
        <label for="categoria">Categoria:</label>
        <select id="categoria">
            <option value="duvidas">Dúvidas Gerais</option>
            <option value="legalizacao">Legalização</option>
            <option value="dp">Departamento Pessoal</option>
            <option value="fiscal">Fiscal</option>
            <option value="contabil">Contábil</option>
            <option value="passoapasso">Passo a Passo (Geral)</option>
            <option value="passoapasso_contabil">Passo a Passo Contábil</option>
        </select>

        <label for="descricao">Descrição da Necessidade:</label>
        <textarea id="descricao" placeholder="Ex: Preciso saber como abrir uma MEI, calcular folha de pagamento, apurar ICMS..."></textarea>

        <label for="detalhes">Detalhes Adicionais (opcional):</label>
        <input type="text" id="detalhes" placeholder="Ex: Foco em MEI, regime Simples Nacional, empresa de serviços...">

        <button class="btn-gerar" id="btnGerar" disabled>Iniciar prompt</button>

        <!-- Resultado -->
        <div class="resultado" id="resultado">
            <!-- Prompt Gerado -->
            <div class="prompt-texto" id="promptTexto"></div>

            <!-- Legenda -->
            <div class="legenda">
                <div class="legenda-item">
                    <span class="legenda-dot dot-direto"></span> Abre direto com prompt carregado
                </div>
                <div class="legenda-item">
                    <span class="legenda-dot dot-copiar"></span> Copia o prompt — cole após abrir
                </div>
            </div>

            <!-- Plataformas -->
            <div class="plataformas-label">Escolha a Plataforma</div>
            <div class="plataformas-grid">

                <!-- ==================== CHATGPT ==================== -->
                <a href="#" class="btn-plataforma btn-chatgpt" id="btnChatGPT" target="_blank">
                    <svg class="logo-ia" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20 2L35.3205 11V29L20 38L4.67949 29V11L20 2Z" fill="#10a37f"/>
                        <path d="M24.5 14C23 12.5 20.8 11.8 18.5 12.2C16.2 12.6 14.5 14.5 14.3 16.9C14.1 19.3 15.5 21.3 17.5 22.2V22.2C19.8 23.2 21.3 25.3 21.1 27.9C20.9 30.5 19 32.5 16.5 32.9C14 33.3 11.6 32.2 10.2 30.1" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M15.5 26C17 27.5 19.2 28.2 21.5 27.8C23.8 27.4 25.5 25.5 25.7 23.1C25.9 20.7 24.5 18.7 22.5 17.8V17.8C20.2 16.8 18.7 14.7 18.9 12.1C19.1 9.5 21 7.5 23.5 7.1C26 6.7 28.4 7.8 29.8 9.9" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span class="nome-ia">ChatGPT</span>
                </a>

                <!-- ==================== PERPLEXITY ==================== -->
                <a href="#" class="btn-plataforma btn-perplexity" id="btnPerplexity" target="_blank">
                    <svg class="logo-ia" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="perpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#1e8c8c"/>
                                <stop offset="100%" stop-color="#14b8a6"/>
                            </linearGradient>
                        </defs>
                        <circle cx="19" cy="17" r="10" stroke="url(#perpGrad)" stroke-width="3" fill="none"/>
                        <ellipse cx="19" cy="17" rx="10" ry="5" stroke="url(#perpGrad)" stroke-width="2" fill="none" transform="rotate(0 19 17)"/>
                        <line x1="19" y1="7" x2="19" y2="27" stroke="url(#perpGrad)" stroke-width="2"/>
                        <line x1="28" y1="12" x2="34" y2="18" stroke="#14b8a6" stroke-width="2.5" stroke-linecap="round" transform="rotate(-45 31 15)"/>
                    </svg>
                    <span class="nome-ia">Perplexity</span>
                </a>

                <!-- ==================== GEMINI (Copia + Abre) ==================== -->
                <a href="#" class="btn-plataforma btn-gemini" id="btnGemini" target="_blank">
                    <svg class="logo-ia" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="gemGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#4285f4"/>
                                <stop offset="100%" stop-color="#8ab4f8"/>
                            </linearGradient>
                            <linearGradient id="gemGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" stop-color="#1a73e8"/>
                                <stop offset="100%" stop-color="#669df6"/>
                            </linearGradient>
                        </defs>
                        <path d="M20 3L24 17L38 17L27 26L31 40L20 32L9 40L13 26L2 17L16 17L20 3Z" fill="url(#gemGrad1)"/>
                        <path d="M20 7L22.5 16L32 16L24.5 23.5L27.5 33L20 27L12.5 33L15.5 23.5L8 16L17.5 16L20 7Z" fill="url(#gemGrad2)"/>
                    </svg>
                    <span class="nome-ia">Gemini</span>
                </a>

                <!-- ==================== CLAUDE (Copia + Abre) ==================== -->
                <a href="#" class="btn-plataforma btn-claude" id="btnClaude" target="_blank">
                    <svg class="logo-ia" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20 3L22.5 16.5L36 14L26.5 22L34 35L20 27L6 35L13.5 22L4 14L17.5 16.5L20 3Z" 
                              fill="#d97706" opacity="0.9"/>
                        <path d="M20 7L21.8 15L30 13L23.8 19L28 27.5L20 21.5L12 27.5L16.2 19L10 13L18.2 15L20 7Z" 
                              fill="#f59e0b"/>
                    </svg>
                    <span class="nome-ia">Claude</span>
                </a>
            </div>

            <!-- Divisor -->
            <hr class="divisor">

            <!-- Botão Copiar Prompt -->
            <div class="btn-copiar-container">
                <button class="btn-copiar" id="btnCopiar">
                    <span class="icone-copiar"></span>
                    <span>Copiar Prompt</span>
                </button>
            </div>

            <!-- Mensagem de feedback -->
            <div class="msg-copiado" id="msgCopiado">✓ Prompt copiado com sucesso!</div>
        </div>
    </div>

    <script>
        // ===== ELEMENTOS DO DOM =====
        const categoria = document.getElementById('categoria');
        const descricao = document.getElementById('descricao');
        const detalhes = document.getElementById('detalhes');
        const btnGerar = document.getElementById('btnGerar');
        const resultado = document.getElementById('resultado');
        const promptTexto = document.getElementById('promptTexto');
        const msgCopiado = document.getElementById('msgCopiado');
        const badgeTopo = document.getElementById('badgeTopo');
        const subtituloPrincipal = document.getElementById('subtituloPrincipal');
        const container = document.getElementById('container');

        // Botões de plataforma
        const btnChatGPT = document.getElementById('btnChatGPT');
        const btnPerplexity = document.getElementById('btnPerplexity');
        const btnGemini = document.getElementById('btnGemini');
        const btnClaude = document.getElementById('btnClaude');

        let promptAtual = '';

        // ===== ATIVAR / DESATIVAR BOTÃO GERAR =====
        function atualizarBotao() {
            if (descricao.value.trim().length > 0) {
                btnGerar.disabled = false;
                btnGerar.classList.add('ativo');
            } else {
                btnGerar.disabled = true;
                btnGerar.classList.remove('ativo');
            }
        }

        descricao.addEventListener('input', atualizarBotao);

        // ===== INSTRUÇÕES POR CATEGORIA =====
        const instrucoes = {
            duvidas: 'Atue como um assistente de pesquisa contábil. Forneça informações atualizadas, cite fontes confiáveis (Receita Federal, CFC, legislação vigente), explique em termos simples e inclua exemplos práticos.',
            legalizacao: 'Atue como um especialista em legalização e abertura de empresas no Brasil. Baseie-se na legislação vigente (Lei nº 14.195/2021, Instrução Normativa DREI, Código Civil). Detalhe o passo a passo, documentos necessários, prazos e custos estimados.',
            dp: 'Atue como um especialista em Departamento Pessoal e Folha de Pagamento. Baseie-se na CLT, leis trabalhistas vigentes, convenções coletivas e normas do eSocial. Inclua cálculos, prazos e exemplos práticos.',
            fiscal: 'Atue como um especialista em contabilidade fiscal e tributária. Baseie-se na legislação tributária brasileira vigente (Código Tributário Nacional, leis do ICMS, IPI, PIS, COFINS, IRPJ, CSLL). Detalhe apurações, prazos, obrigações acessórias e exemplos de cálculos.',
            contabil: 'Atue como um contador especialista seguindo as NBCs (Normas Brasileiras de Contabilidade), CPCs e legislação societária. Explane sobre lançamentos contábeis, demonstrações financeiras, conciliações e boas práticas contábeis com exemplos práticos.',
            passoapasso: 'Atue como um especialista em processos contábeis e empresariais. Estruture sua resposta em formato de tutorial passo a passo, numerando cada etapa em ordem cronológica. Para cada passo, inclua: o que fazer, como fazer, documentos/formulários necessários, prazos e observações importantes.',
            passoapasso_contabil: 'Atue como um contador especialista em rotinas e processos contábeis. Estruture sua resposta como um ROTEIRO PRÁTICO passo a passo, numerando cada etapa em ordem cronológica de execução. Para cada passo, forneça: descrição clara, documentos/informações necessárias, como executar (com exemplos de lançamentos contábeis em partidas dobradas), contas contábeis envolvidas, prazos legais e erros comuns a evitar. Baseie-se nas NBC TG, CPCs e ITG 1000 (para PMEs).'
        };

        const nomesCategoria = {
            duvidas: 'Dúvidas Gerais',
            legalizacao: 'Legalização de Empresas',
            dp: 'Departamento Pessoal',
            fiscal: 'Fiscal e Tributário',
            contabil: 'Contábil',
            passoapasso: 'Passo a Passo (Geral)',
            passoapasso_contabil: 'Passo a Passo Contábil'
        };

        // ===== DADOS DE INTERFACE POR CATEGORIA =====
        const dadosCategoria = {
            duvidas: {
                badge: '🔍 Pesquisa & Consultoria Contábil',
                subtitulo: 'Tire dúvidas contábeis com respostas embasadas, didáticas e com exemplos práticos!',
                borda: '#3b82f6',
                placeholderDescricao: 'Ex: Qual a diferença entre Lucro Real e Lucro Presumido? Quando devo emitir nota fiscal?',
                placeholderDetalhes: 'Ex: Empresa do Simples Nacional, comércio varejista...'
            },
            legalizacao: {
                badge: '📋 Legalização & Abertura de Empresas',
                subtitulo: 'Obtenha orientações completas sobre abertura, alteração e baixa de empresas no Brasil!',
                borda: '#10b981',
                placeholderDescricao: 'Ex: Quero abrir uma MEI, transformar MEI em ME, abrir uma EIRELI, dar baixa no CNPJ...',
                placeholderDetalhes: 'Ex: Empresa de serviços de TI, sem sócios, faturamento estimado de 80k/ano...'
            },
            dp: {
                badge: '👔 Departamento Pessoal & RH',
                subtitulo: 'Respostas especializadas em CLT, folha de pagamento, eSocial, férias, rescisão e muito mais!',
                borda: '#f59e0b',
                placeholderDescricao: 'Ex: Como calcular horas extras? Quais os prazos para pagamento de rescisão? Como lançar férias no eSocial?',
                placeholderDetalhes: 'Ex: Funcionário com salário de R$3.000, jornada 220h mensais...'
            },
            fiscal: {
                badge: '🧾 Área Fiscal & Tributária',
                subtitulo: 'Apuração de impostos, obrigações acessórias, SPED e tributos federais, estaduais e municipais!',
                borda: '#ef4444',
                placeholderDescricao: 'Ex: Como apurar ICMS-ST? Quais as alíquotas de PIS/COFINS para serviços? Como declarar o SPED Fiscal?',
                placeholderDetalhes: 'Ex: Regime Lucro Presumido, comércio atacadista, operações interestaduais...'
            },
            contabil: {
                badge: '📒 Rotinas Contábeis & Societárias',
                subtitulo: 'Lançamentos contábeis, demonstrações financeiras, conciliações, fechamento mensal e normas NBC/CPC!',
                borda: '#8b5cf6',
                placeholderDescricao: 'Ex: Como contabilizar depreciação? Qual o lançamento da folha de pagamento? Como encerrar o balanço anual?',
                placeholderDetalhes: 'Ex: Empresa do Lucro Real, porte médio, regime de competência...'
            },
            passoapasso: {
                badge: '🪜 Tutorial Passo a Passo (Geral)',
                subtitulo: 'Receba um tutorial completo e numerado sobre qualquer processo contábil, fiscal, trabalhista ou societário!',
                borda: '#06b6d4',
                placeholderDescricao: 'Ex: Passo a passo para abrir uma empresa, calcular folha, emitir nota fiscal, registrar uma ata...',
                placeholderDetalhes: 'Ex: Foco em pequenas empresas, prazo de 30 dias, regime Simples Nacional...'
            },
            passoapasso_contabil: {
                badge: '📐 Passo a Passo Contábil Avançado',
                subtitulo: 'Roteiros práticos com lançamentos, razonetes, plano de contas, checklists e referências às NBC TG e CPCs!',
                borda: '#a855f7',
                placeholderDescricao: 'Ex: Como fazer o fechamento contábil mensal? Rotina de conciliação bancária? Apuração do resultado do exercício?',
                placeholderDetalhes: 'Ex: PME (ITG 1000), Lucro Real trimestral, sistema ERP Prosoft...'
            }
        };

        function atualizarInterface() {
            const cat = categoria.value;
            const dados = dadosCategoria[cat];
            badgeTopo.textContent = dados.badge;
            subtituloPrincipal.textContent = dados.subtitulo;
            container.style.borderColor = dados.borda;
            descricao.placeholder = dados.placeholderDescricao;
            detalhes.placeholder = dados.placeholderDetalhes;
        }

        atualizarInterface();
        categoria.addEventListener('change', atualizarInterface);

        // ===== FUNÇÃO DE FEEDBACK =====
        function mostrarMsg(texto, cor) {
            msgCopiado.textContent = texto;
            msgCopiado.style.color = cor || '#a78bfa';
            msgCopiado.style.display = 'block';
            clearTimeout(msgCopiado._timeout);
            msgCopiado._timeout = setTimeout(() => {
                msgCopiado.style.display = 'none';
            }, 3000);
        }

        // ===== FUNÇÃO AUXILIAR PARA COPIAR =====
        async function copiarParaClipboard(texto) {
            try {
                await navigator.clipboard.writeText(texto);
                return true;
            } catch (err) {
                const textarea = document.createElement('textarea');
                textarea.value = texto;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                return true;
            }
        }

        // ===== FUNÇÃO GENÉRICA: Copia prompt + Abre plataforma =====
        async function copiarEAbrir(urlBase, nomePlataforma) {
            if (!promptAtual) {
                window.open(urlBase, '_blank');
                return;
            }
            await copiarParaClipboard(promptAtual);
            mostrarMsg(`📋 Prompt copiado! Abrindo ${nomePlataforma} — cole com Ctrl+V`, '#f59e0b');
            setTimeout(() => {
                window.open(urlBase, '_blank');
            }, 400);
        }

        // ===== GERAÇÃO DO PROMPT =====
        btnGerar.addEventListener('click', () => {
            const desc = descricao.value.trim();
            const det = detalhes.value.trim();
            const cat = categoria.value;
            if (!desc) return;

            let prompt = `${instrucoes[cat]}\n\n`;
            prompt += `**Categoria:** ${nomesCategoria[cat]}\n`;
            prompt += `**Minha necessidade:** ${desc}\n`;
            if (det) prompt += `**Detalhes adicionais:** ${det}\n`;
            prompt += `\nPor favor, responda de forma estruturada, com tópicos, exemplos práticos e, quando possível, cite a base legal ou normativa aplicável. Se houver dúvidas sobre o contexto, aponte-as antes de responder.`;

            promptAtual = prompt;
            promptTexto.textContent = prompt;
            resultado.classList.add('mostrar');

            resultado.scrollIntoView({ behavior: 'smooth', block: 'start' });

            // ===== CONFIGURA BOTÕES =====
            const promptEnc = encodeURIComponent(promptAtual);

            // ChatGPT e Perplexity → fluxo DIRETO (abrem com prompt já carregado na URL)
            btnChatGPT.href = `https://chat.openai.com/?q=${promptEnc}`;
            btnPerplexity.href = `https://www.perplexity.ai/search/?q=${promptEnc}`;

            // Gemini e Claude → fluxo COPIAR + ABRIR (sem prompt na URL)
            btnGemini.href = 'https://gemini.google.com/';
            btnClaude.href = 'https://claude.ai/new';
        });

        // ===== CLIQUE NO GEMINI: Copia prompt + Abre Gemini =====
        btnGemini.addEventListener('click', function(e) {
            e.preventDefault();
            copiarEAbrir('https://gemini.google.com/', 'Gemini');
        });

        // ===== CLIQUE NO CLAUDE: Copia prompt + Abre Claude =====
        btnClaude.addEventListener('click', function(e) {
            e.preventDefault();
            copiarEAbrir('https://claude.ai/new', 'Claude');
        });

        // ===== BOTÃO COPIAR PROMPT (geral) =====
        document.getElementById('btnCopiar').addEventListener('click', async () => {
            await copiarParaClipboard(promptTexto.textContent);
            mostrarMsg('✓ Prompt copiado com sucesso!');
        });
    </script>
</body>
</html>
